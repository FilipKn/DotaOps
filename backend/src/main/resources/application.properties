spring.application.name=dotaops-backend
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://127.0.0.1:54322/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:30000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:600000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=public
spring.flyway.create-schemas=false

dotaops.supabase.auth.jwt-secret=${SUPABASE_JWT_SECRET:}
dotaops.supabase.auth.issuer=${SUPABASE_JWT_ISSUER:}
dotaops.supabase.auth.audience=${SUPABASE_JWT_AUDIENCE:authenticated}
dotaops.supabase.auth.clock-skew=30s

dotaops.steam.auth.openid-endpoint=${STEAM_OPENID_ENDPOINT:https://steamcommunity.com/openid/login}
dotaops.steam.auth.realm=${STEAM_OPENID_REALM:http://localhost:8080}
dotaops.steam.auth.return-url=${STEAM_OPENID_RETURN_URL:http://localhost:8080/api/auth/steam/callback}
dotaops.steam.auth.web-api-key=${STEAM_WEB_API_KEY:}
dotaops.steam.auth.player-summaries-url=${STEAM_PLAYER_SUMMARIES_URL:https://api.steampowered.com/ISteamUser/GetPlayerSummaries/v0002/}
dotaops.steam.auth.frontend-redirect-url=${FRONTEND_AUTH_REDIRECT_URL:}
dotaops.steam.auth.state-ttl=${STEAM_OPENID_STATE_TTL:10m}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
