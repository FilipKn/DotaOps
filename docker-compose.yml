name: dotaops

services:
  # Backend (Spring Boot)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dotaops-backend
    environment:
      SERVER_PORT: 8080
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      SUPABASE_DB_USER: ${SUPABASE_DB_USER}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://127.0.0.1:3000}
      OPENDOTA_API_BASE_URL: ${OPENDOTA_API_BASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      DOTAOPS_IMAGES_BUCKET: ${DOTAOPS_IMAGES_BUCKET:-dotaops-images}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      SUPABASE_JWKS_URI: ${SUPABASE_JWKS_URI:-}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-3}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-0}
    ports:
      - "8080:8080"
    networks:
      - dotaops-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_SERVER_API_URL: ${NEXT_SERVER_API_URL:-http://backend:8080/api}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: dotaops-frontend
    environment:
      NEXT_SERVER_API_URL: ${NEXT_SERVER_API_URL:-http://backend:8080/api}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dotaops-network

networks:
  dotaops-network:
    driver: bridge
